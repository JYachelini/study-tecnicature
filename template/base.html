<!-- INSTRUCCIONES PARA EL GENERADOR:
     Reemplazar los siguientes placeholders al generar un HTML de unidad:
     - {{MATERIA}}        : Nombre legible de la materia
     - {{UNIDAD_BADGE}}   : Ej. "Arquitectura y Sistemas Operativos · Unidad 1"
     - {{TITULO_H1}}      : Título con <br> y <span> para resaltar
     - {{SUBTITULO}}      : Ej. "Tecnicatura Universitaria en Programación"
     - {{MATERIAL_LINKS}} : Bloque de <a class="material-link"> por cada PDF en ../material/
     - {{TABS}}           : Botones de tab según secciones incluidas
     - {{CONTENIDO}}      : Secciones de resumen, conceptos, detalle, flashcards, quiz, etc.
-->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITULO_PAGINA}}</title>
<style>
  :root {
    --bg: #0b0e17;
    --surface: #111827;
    --card: #1a2235;
    --card-hover: #1e2a42;
    --border: #2a3755;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.25);
    --accent2: #8b5cf6;
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.12);
    --error: #f87171;
    --error-bg: rgba(248,113,113,0.12);
    --warning: #fbbf24;
    --text: #e2e8f0;
    --text-muted: #7b8fa8;
    --text-dim: #4b6080;
    --mono: "Menlo", "Courier New", monospace;
    --sans: "Georgia", "Times New Roman", serif;
    --heading: system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0b0e17 0%, #111827 50%, #0f1823 100%);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    padding: 0.25rem 0.75rem;
    border-radius: 2rem;
    margin-bottom: 1rem;
  }
  header h1 {
    font-family: var(--heading);
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 0.5rem;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--text-muted);
    font-family: var(--heading);
    font-size: 0.95rem;
  }

  /* ── MATERIAL BAR ── */
  .material-bar{background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;justify-content:center;}
  .material-link{display:inline-flex;align-items:center;gap:.3rem;font-family:var(--heading);font-size:.72rem;font-weight:500;color:var(--text-muted);text-decoration:none;background:rgba(255,255,255,.05);border:1px solid var(--border);padding:.22rem .65rem;border-radius:2rem;transition:color .2s,border-color .2s,background .2s;}
  .material-link:hover{color:var(--accent);border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08);}

  /* ── BACK BUTTON ── */
  .back-btn{position:fixed;top:1rem;left:1rem;z-index:200;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted,#7b8fa8);text-decoration:none;padding:.38rem .72rem;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:color .2s,border-color .2s,background .2s;white-space:nowrap;line-height:1;}
  .back-btn:hover{color:var(--accent,#4fc3f7);border-color:rgba(255,255,255,.28);background:rgba(0,0,0,.75);}
</style>
</head>
<body>
<a class="back-btn" href="../../../index.html">&#8592; Inicio</a>

<header>
  <div class="badge">{{UNIDAD_BADGE}}</div>
  <h1>{{TITULO_H1}}</h1>
  <p>{{SUBTITULO}}</p>
</header>

<div class="material-bar">
  <span style="font-family:var(--heading);font-size:.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-right:.25rem;">📎 Material</span>
  {{MATERIAL_LINKS}}
</div>

<!-- TABS -->
{{TABS}}

<!-- CONTENIDO -->
{{CONTENIDO}}

</body>
</html>
